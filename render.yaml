services:
  - type: web
    name: kaspi-bot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python kaspi_bot_webhook.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
      - key: PORT
        value: 10000
